# Monorepo: compose en la raíz del repo. En Dokploy: Compose Path = ./docker-compose.yml
# Variables en Dokploy (pestaña Environment) → se escriben en .env junto a este archivo.
# Obligatorias en producción: VITE_BACKEND_URL (URL pública del API, p. ej. https://api.tudominio.com)
# y FRONTEND_URLS (orígenes CORS del front, p. ej. https://app.tudominio.com).

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./Cagadas-BackEnd
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: "3000"
      MONGODB_URI: mongodb://mongo:27017/cagadas
      FRONTEND_URLS: ${FRONTEND_URLS}
    networks:
      - internal
      - dokploy-network
    ports:
      - "3000"

  frontend:
    build:
      context: ./Cagadas-FrontEnd
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - dokploy-network
    ports:
      - "5173"

volumes:
  mongo_data:

networks:
  dokploy-network:
    external: true
  internal:
    driver: bridge
